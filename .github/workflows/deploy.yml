name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 37.27.248.253 >> ~/.ssh/known_hosts
          echo "Public key abgeleitet aus dem Secret:"
          ssh-keygen -y -f ~/.ssh/deploy_key
          echo "Fingerprint:"
          ssh-keygen -lf ~/.ssh/deploy_key

      - name: Sync code to server
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            ./ root@37.27.248.253:/opt/ballongarten/

      - name: Install deps and restart service
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            root@37.27.248.253 \
            "cd /opt/ballongarten && npm install --omit=dev && systemctl restart ballongarten"
