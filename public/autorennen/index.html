<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#1b2030">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<title>Autorennen</title>
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;-webkit-user-select:none;user-select:none;overscroll-behavior:none}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(180deg,#232a42 0%,#1b2030 60%,#0f1320 100%);
  color:#f1f5f9;min-height:100dvh;touch-action:manipulation;
}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* ── Szenen ── */
.scene{display:none;padding:16px;min-height:100dvh;flex-direction:column;align-items:center;gap:14px}
.scene.active{display:flex}

h1{font-size:30px;margin:6px 0;text-align:center;letter-spacing:.5px}
h2{font-size:18px;margin:2px 0;text-align:center;opacity:.85;font-weight:500}
p{margin:4px 0;text-align:center}
.sub{font-size:13px;opacity:.65}

.card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);
  border-radius:18px;padding:16px;width:100%;max-width:460px;
  box-shadow:0 8px 24px rgba(0,0,0,.35)}

.btn{background:linear-gradient(180deg,#ffca60,#ff8a1a);color:#3a2010;border:none;
  border-radius:14px;padding:14px 18px;font-size:18px;font-weight:700;
  box-shadow:0 4px 0 #c4670d,0 6px 14px rgba(0,0,0,.3);width:100%}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 #c4670d}

/* ── Farbwahl ── */
.swatches{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:10px}
.swatch{aspect-ratio:1/1;border-radius:50%;border:3px solid rgba(255,255,255,.12);
  cursor:pointer;box-shadow:inset 0 -6px 10px rgba(0,0,0,.25),0 3px 8px rgba(0,0,0,.3);
  transition:transform .15s,border-color .15s}
.swatch.sel{border-color:#fff;transform:scale(1.08)}

/* ── Reifenwahl ── */
.tires{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
.tire{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);
  border-radius:14px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;
  gap:6px;cursor:pointer;transition:all .15s}
.tire.sel{border-color:#ffca60;background:rgba(255,202,96,.12)}
.tire svg{width:44px;height:44px}
.tire .lbl{font-size:11px;font-weight:600;opacity:.9}

/* ── Spiel-Scene ── */
#game{padding:0;position:relative;overflow:hidden;background:#1b2030}
#game canvas{display:block;width:100vw;height:100dvh;touch-action:none}
.hud{position:absolute;top:10px;left:12px;right:12px;display:flex;justify-content:space-between;
  align-items:center;font-weight:700;pointer-events:none;
  text-shadow:0 2px 6px rgba(0,0,0,.6)}
.hud .stats{display:flex;gap:6px;pointer-events:auto}
.hud .stat{background:rgba(0,0,0,.35);padding:6px 10px;border-radius:10px;font-size:13px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.hud .speed{background:rgba(0,0,0,.35);padding:6px 12px;border-radius:10px;font-size:14px;
  pointer-events:auto}
.hud .back{background:rgba(0,0,0,.45);color:#fff;border:none;border-radius:10px;padding:6px 12px;
  font-weight:700;font-size:14px;pointer-events:auto;cursor:pointer}

/* Hinweis, wenn Handy nicht quer ist */
.rotate-hint{position:absolute;inset:0;background:rgba(15,19,32,.92);display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;
  text-align:center;z-index:10}
.rotate-hint.show{display:flex}
.rotate-hint svg{width:80px;height:80px;animation:turnhint 1.8s ease-in-out infinite}
@keyframes turnhint{0%,100%{transform:rotate(0)}50%{transform:rotate(90deg)}}

/* POS-Anzeige oben links */
.hud .pos-wrap{background:linear-gradient(180deg,#1f2937,#0f172a);border-radius:12px;padding:6px 14px;
  pointer-events:auto;display:flex;flex-direction:column;align-items:center;min-width:68px;
  box-shadow:0 4px 10px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08)}
.hud .pos-label{font-size:10px;letter-spacing:2px;opacity:.7}
.hud .pos-val{font-size:22px;font-weight:900;line-height:1}

/* Fortschrittsbalken oben zentriert */
.progress-wrap{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:6px;pointer-events:none;z-index:6;
  width:min(60vw,360px)}
.progress-bar{flex:1;height:10px;background:rgba(0,0,0,.45);border-radius:5px;overflow:hidden;
  border:1px solid rgba(255,255,255,.12)}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,#22c55e,#fbbf24,#ef4444);
  transition:width .15s ease-out;border-radius:5px}
.progress-flag{font-size:16px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}

/* Start-Overlay mit großem Knopf */
.start-overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
  justify-content:center;z-index:9;background:rgba(10,14,24,.45);backdrop-filter:blur(2px);pointer-events:auto}
.start-overlay.show{display:flex}
.race-start-btn{
  width:clamp(160px, 30vmin, 230px); height:clamp(160px, 30vmin, 230px);
  border-radius:50%; border:6px solid rgba(255,255,255,.85);
  background:radial-gradient(circle at 35% 30%,#4ade80 0%,#22c55e 55%,#166534 100%);
  color:#fff; font-size:44px; font-weight:900; letter-spacing:3px;
  box-shadow:0 10px 0 #14532d, 0 16px 32px rgba(0,0,0,.5);
  cursor:pointer; touch-action:manipulation
}
.race-start-btn:active{transform:translateY(4px);box-shadow:0 6px 0 #14532d, 0 10px 22px rgba(0,0,0,.45)}

/* Countdown-Ziffer in der Mitte */
.countdown{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  z-index:9;pointer-events:none}
.countdown.show{display:flex}
.countdown span{font-size:clamp(90px, 20vmin, 180px);font-weight:900;color:#fff;
  text-shadow:0 6px 0 #0f172a, 0 10px 30px rgba(0,0,0,.6);animation:cd .9s ease-out forwards}
@keyframes cd{
  0%{transform:scale(1.6);opacity:0}
  20%{transform:scale(1);opacity:1}
  80%{transform:scale(1);opacity:1}
  100%{transform:scale(0.7);opacity:0}
}

/* Ziel-Overlay */
.finish-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  z-index:9;background:rgba(10,14,24,.65);backdrop-filter:blur(4px);pointer-events:auto;padding:20px}
.finish-overlay.show{display:flex}
.finish-card{background:rgba(30,40,60,.95);border:1px solid rgba(255,255,255,.12);
  border-radius:18px;padding:22px 26px;max-width:420px;width:100%;text-align:center;
  box-shadow:0 12px 40px rgba(0,0,0,.5)}
.finish-card h2{font-size:30px;margin:0 0 4px;letter-spacing:.5px}
.finish-card .btn{width:auto;padding:12px 22px}

/* Hup-Knopf unten links (klein) */
.honk{position:absolute;left:18px;bottom:18px;width:62px;height:62px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#ff6b6b 0%,#e11d48 55%,#9f1239 100%);
  border:3px solid #fecaca;box-shadow:0 5px 0 #7f1d1d,0 8px 16px rgba(0,0,0,.35);
  color:#fff;font-weight:900;font-size:13px;letter-spacing:.5px;
  display:flex;align-items:center;justify-content:center;pointer-events:auto;cursor:pointer;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;z-index:7}
.honk:active{transform:translateY(3px);box-shadow:0 2px 0 #7f1d1d,0 5px 10px rgba(0,0,0,.35)}

/* Gaspedal unten rechts (groß, duldet Halten) */
.gas{position:absolute;right:18px;bottom:18px;width:clamp(90px,16vmin,130px);
  height:clamp(90px,16vmin,130px);border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#86efac 0%,#22c55e 55%,#15803d 100%);
  border:4px solid rgba(255,255,255,.85);
  box-shadow:0 8px 0 #14532d,0 14px 24px rgba(0,0,0,.4);
  color:#fff;font-weight:900;font-size:clamp(18px,3vmin,26px);letter-spacing:2px;
  display:flex;align-items:center;justify-content:center;pointer-events:auto;cursor:pointer;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;z-index:7}
.gas.pressed{transform:translateY(5px);box-shadow:0 3px 0 #14532d,0 8px 14px rgba(0,0,0,.4);
  background:radial-gradient(circle at 35% 30%,#bbf7d0 0%,#4ade80 55%,#166534 100%)}
</style>
</head>
<body>

<!-- ══════════ MENÜ ══════════ -->
<section id="menu" class="scene active">
  <h1>Autorennen</h1>
  <h2>Such dir dein Auto aus</h2>

  <div class="card">
    <p style="font-weight:700;margin-bottom:4px">Farbe</p>
    <div id="swatches" class="swatches"></div>
  </div>

  <div class="card">
    <p style="font-weight:700;margin-bottom:4px">Reifen</p>
    <div id="tires" class="tires"></div>
  </div>

  <div class="card">
    <button id="startBtn" class="btn">Los geht's!</button>
    <p class="sub" style="margin-top:10px">Tipp: Halte das Handy quer, dann geht's von selbst los. Zum Lenken nach links/rechts neigen.</p>
  </div>
</section>

<!-- ══════════ SPIEL ══════════ -->
<section id="game" class="scene">
  <canvas id="road"></canvas>

  <div class="hud">
    <button id="backBtn" class="back">‹ Menü</button>
    <div class="pos-wrap"><span class="pos-label">POS</span> <span id="pos" class="pos-val">—</span></div>
    <div class="stats">
      <div class="stat" id="speed">0 km/h</div>
    </div>
  </div>

  <!-- Fortschrittsbalken: wie weit bin ich auf der Strecke -->
  <div class="progress-wrap">
    <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
    <div class="progress-flag">🏁</div>
  </div>

  <button id="honkBtn" class="honk" aria-label="Hupe">HUP</button>
  <button id="gasBtn" class="gas" aria-label="Gaspedal">GAS</button>

  <div id="rotateHint" class="rotate-hint">
    <svg viewBox="0 0 64 64" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <rect x="18" y="6" width="28" height="52" rx="5"/>
      <circle cx="32" cy="52" r="2" fill="#fff"/>
    </svg>
    <p style="font-size:18px;font-weight:700;margin:0">Bitte Handy quer halten</p>
    <p class="sub">…dann geht's los.</p>
  </div>

  <!-- Start-Overlay: großer GO-Knopf, bevor das Rennen losgeht -->
  <div id="startOverlay" class="start-overlay show">
    <button id="raceStartBtn" class="race-start-btn">START</button>
    <p class="sub" style="margin-top:10px;opacity:.8">Handy quer halten und losdrücken</p>
  </div>

  <!-- Countdown 3…2…1…LOS -->
  <div id="countdown" class="countdown"></div>

  <!-- Ergebnis-Overlay am Ziel -->
  <div id="finishOverlay" class="finish-overlay">
    <div class="finish-card">
      <h2 id="finishPlace">1. Platz!</h2>
      <p id="finishTime" class="sub"></p>
      <button id="restartBtn" class="btn" style="margin-top:14px">Nochmal</button>
    </div>
  </div>
</section>

<script>
// ══════════ Zustand ══════════
const state = {
  color: '#e11d48',
  tire: 'normal'
};

// Letzte Auswahl merken, damit Auto-Start beim nächsten Mal das richtige Auto nimmt
try {
  const saved = JSON.parse(localStorage.getItem('autorennen.state') || 'null');
  if (saved && typeof saved === 'object') {
    if (saved.color) state.color = saved.color;
    if (saved.tire)  state.tire  = saved.tire;
  }
} catch {}
function persistState(){
  try { localStorage.setItem('autorennen.state', JSON.stringify(state)); } catch {}
}

const COLORS = [
  '#e11d48', // rot
  '#2563eb', // blau
  '#16a34a', // grün
  '#fbbf24', // gelb
  '#ec4899', // pink
  '#8b5cf6'  // lila
];

const TIRES = [
  { id:'normal',  label:'Normal',  icon:tireIcon('normal')  },
  { id:'sport',   label:'Sport',   icon:tireIcon('sport')   },
  { id:'offroad', label:'Offroad', icon:tireIcon('offroad') },
  { id:'stern',   label:'Sterne',  icon:tireIcon('stern')   }
];

function tireIcon(kind){
  // kleine Vorschau-SVG-Symbole für die Reifenwahl
  const ring = '<circle cx="22" cy="22" r="20" fill="#0f172a"/>';
  const hub = '<circle cx="22" cy="22" r="7" fill="#94a3b8"/>';
  let deco = '';
  if(kind==='normal')  deco = '<circle cx="22" cy="22" r="14" fill="none" stroke="#475569" stroke-width="2"/>';
  if(kind==='sport')   deco = '<g stroke="#facc15" stroke-width="2.5"><line x1="22" y1="8"  x2="22" y2="36"/><line x1="8"  y1="22" x2="36" y2="22"/><line x1="12" y1="12" x2="32" y2="32"/><line x1="32" y1="12" x2="12" y2="32"/></g>';
  if(kind==='offroad') deco = '<g fill="#65a30d"><circle cx="22" cy="7"  r="2.5"/><circle cx="22" cy="37" r="2.5"/><circle cx="7"  cy="22" r="2.5"/><circle cx="37" cy="22" r="2.5"/><circle cx="11" cy="11" r="2.5"/><circle cx="33" cy="33" r="2.5"/><circle cx="33" cy="11" r="2.5"/><circle cx="11" cy="33" r="2.5"/></g>';
  if(kind==='stern')   deco = '<text x="22" y="28" text-anchor="middle" font-size="20" fill="#f472b6">★</text>';
  return `<svg viewBox="0 0 44 44">${ring}${deco}${hub}</svg>`;
}

// ══════════ Menü aufbauen ══════════
const swatchEl = document.getElementById('swatches');
COLORS.forEach((c)=>{
  const d=document.createElement('div');
  d.className='swatch'+(c===state.color?' sel':'');
  d.style.background=c;
  d.dataset.color=c;
  d.addEventListener('click',()=>{
    state.color=c;
    swatchEl.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('sel',s.dataset.color===c));
    persistState();
  });
  swatchEl.appendChild(d);
});

const tiresEl = document.getElementById('tires');
TIRES.forEach((t)=>{
  const d=document.createElement('div');
  d.className='tire'+(t.id===state.tire?' sel':'');
  d.dataset.tire=t.id;
  d.innerHTML = t.icon + `<span class="lbl">${t.label}</span>`;
  d.addEventListener('click',()=>{
    state.tire=t.id;
    tiresEl.querySelectorAll('.tire').forEach(s=>s.classList.toggle('sel',s.dataset.tire===t.id));
    persistState();
  });
  tiresEl.appendChild(d);
});

// ══════════ Szenenwechsel ══════════
const menuScene = document.getElementById('menu');
const gameScene = document.getElementById('game');
function showScene(which){
  menuScene.classList.toggle('active', which==='menu');
  gameScene.classList.toggle('active', which==='game');
}

document.getElementById('backBtn').addEventListener('click',()=>{
  stopGame();
  showScene('menu');
});

// ══════════ Canvas + Render-Loop ══════════
const canvas = document.getElementById('road');
const ctx = canvas.getContext('2d');
const speedEl = document.getElementById('speed');
const rotateHint = document.getElementById('rotateHint');

let W=0, H=0, DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = canvas.clientWidth;
  H = canvas.clientHeight;
  canvas.width  = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
// orientationchange feuert auf Mobile zuverlässiger als resize beim Drehen.
// kleine Verzögerung, weil iOS die neuen Maße erst nach dem Event liefert.
window.addEventListener('orientationchange', () => setTimeout(resize, 200));

// ══════════ Rennen-Zustand ══════════
// Drei Spuren auf einer breiten Strecke. Die Spielfigur steuert über carX,
// Gegner haben feste Spuren. Alle haben eine "distance" entlang der
// Rennstrecke (0 am Start, TRACK_LENGTH am Ziel).
const MAX_SPEED     = 300;         // Max-Speed wenn Gaspedal voll gedrückt (Units/s)
const LANES         = [-0.65, 0, 0.65];
const SCROLL_FACTOR = 0.0022;      // Wie schnell Welt an Kamera vorbeirauscht
const HORIZON_RATIO = 0.42;
const TRACK_LENGTH  = 1400;

const world = {
  running:false,
  phase:'start',          // 'start' | 'countdown' | 'racing' | 'finished'
  countdown:0,            // verbleibende Sekunden im Countdown
  scroll:0,
  carX:0,                 // -1..+1 Lateral-Position
  tilt:0,
  throttle:0,             // 0..1 aus dem Gaspedal
  // Spieler:
  playerDistance:0,
  playerSpeed:0,
  // Gegner — werden beim Start in Lanes sortiert platziert
  opponents:[],
  // Pylonen (nicht-Auto-Hindernisse), vorgeneriert:
  cones:[],
  flash:0,
  hitCooldown:0,
  raceTime:0,
  finishResult:null       // {place, time}
};

// ══════════ Streckenführung mit Kurven ══════════
// curveOffsetAt(d) liefert einen "Welt-X-Versatz" der Straßenmitte bei
// Welt-Distanz d. Die Überlagerung mehrerer Sinus-Kurven ergibt eine
// abwechslungsreiche Strecke mit sanften Links- und Rechts-Biegungen.
function curveOffsetAt(d){
  return Math.sin(d * 0.011) * 160 + Math.cos(d * 0.0048) * 90;
}
// Ableitung (numerisch) für die Drift-Kraft auf den Spieler
function curveSlopeAt(d){
  const e = 1;
  return (curveOffsetAt(d + e) - curveOffsetAt(d - e)) / (2 * e);
}

const CAR_COLORS = ['#2563eb','#16a34a','#f59e0b','#8b5cf6','#ec4899','#64748b'];

function initRace(){
  // Gegner auf die drei Spuren verteilen, leicht gestaffelt. Vier
  // Gegner ergibt Positionen 1–5 (inkl. Spieler). Jeder hat seine
  // Grundgeschwindigkeit und ein leichtes Rauschen, damit sich das
  // Ranking während des Rennens verschiebt.
  // Startgrid: zwei Reihen links+rechts vom Spieler, sodass der Spieler in
  // der Mittelspur hinter dem Feld startet und aufholen muss.
  world.opponents = [
    { lane:LANES[0], distance: 24, baseSpeed: 236, speed:0, color:'#2563eb', phase:Math.random()*Math.PI*2 },
    { lane:LANES[2], distance: 24, baseSpeed: 232, speed:0, color:'#ef4444', phase:Math.random()*Math.PI*2 },
    { lane:LANES[0], distance: 48, baseSpeed: 228, speed:0, color:'#a855f7', phase:Math.random()*Math.PI*2 },
    { lane:LANES[2], distance: 48, baseSpeed: 240, speed:0, color:'#f59e0b', phase:Math.random()*Math.PI*2 }
  ];
  // Pylonen pseudo-random über die Strecke verteilen — nicht zu dicht,
  // nicht direkt am Start.
  world.cones = [];
  let d = 120;
  while (d < TRACK_LENGTH - 60){
    const lane = LANES[Math.floor(Math.random() * LANES.length)];
    world.cones.push({ lane, distance: d, hit:false });
    d += 55 + Math.random() * 80;
  }
  world.playerDistance = 0;
  world.playerSpeed = 0;
  world.throttle = 0;
  world.carX = LANES[1]; // Spieler startet in Mittelspur
  world.tilt = 0;
  world.scroll = 0;
  world.flash = 0;
  world.hitCooldown = 0;
  world.raceTime = 0;
  world.finishResult = null;
  steer.baseline = null;
  const gb = document.getElementById('gasBtn');
  if (gb) gb.classList.remove('pressed');
}

function checkOrientation(){
  const portrait = window.innerHeight > window.innerWidth;
  rotateHint.classList.toggle('show', portrait);
  return !portrait;
}

// ══════════ Pseudo-3D-Projektion ══════════
// z: 1 = Horizont, 0 = direkt an der Kamera, <0 = schon hinter dem Fahrer.
// laneRel: relative Spur zur Kamera (nach Abzug von world.carX).
const VISION_RANGE = 280; // wie weit wir nach vorn schauen (in Distance-Units)
function project(laneRel, z){
  const hy = H * HORIZON_RATIO;
  const nz = Math.max(0, 1 - z);
  const depth = Math.pow(nz, 1.35);
  const y = hy + (H - hy + 30) * depth;
  // Straße deutlich breiter als vorher (~2× die alte Breite)
  const roadHalfBase = Math.min(W * 0.72, 620);
  const roadHalfTop  = 20;
  const roadHalf = roadHalfTop + (roadHalfBase - roadHalfTop) * depth;

  // Kurve: wie stark ist die Straßenmitte an dieser Welt-Distanz versetzt?
  const worldDist = world.playerDistance + z * VISION_RANGE;
  const curveX = curveOffsetAt(worldDist) - curveOffsetAt(world.playerDistance);
  const curveLateral = curveX * (1 - depth); // am Horizont voll, am Auto 0

  const x = W/2 + curveLateral + laneRel * roadHalf;
  const scale = 0.08 + depth * 0.92;
  return { x, y, scale, roadHalf };
}

// Welt-Distanz → z-Wert relativ zum Spieler
function distanceToZ(distance){
  return (distance - world.playerDistance) / VISION_RANGE;
}

// Straße, Himmel, Gras — in Segmenten, damit scrollende Streifen Bewegung zeigen
function drawRoad(dt){
  const hy = H * HORIZON_RATIO;

  // Himmel
  const sky = ctx.createLinearGradient(0, 0, 0, hy);
  sky.addColorStop(0, '#6ab0ff');
  sky.addColorStop(1, '#d8e8ff');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, hy);

  // Boden
  ctx.fillStyle = '#3b5a2a';
  ctx.fillRect(0, hy, W, H - hy);

  // Sonne am Horizont
  ctx.fillStyle = 'rgba(255,240,200,.6)';
  ctx.beginPath();
  ctx.ellipse(W/2, hy - 6, 50, 12, 0, 0, Math.PI*2);
  ctx.fill();

  // scroll wird jetzt in updateRace() basierend auf playerSpeed hochgezählt
  const SEG = 18;
  for (let i = 0; i < SEG; i++){
    const zNear = 1 - ((i     + world.scroll) / SEG);
    const zFar  = 1 - ((i + 1 + world.scroll) / SEG);
    if (zNear <= 0 && zFar <= 0) continue;

    const pn = project(0, Math.max(0, zNear));
    const pf = project(0, Math.max(0, zFar));
    const yN = pn.y, yF = pf.y;
    const hN = pn.roadHalf, hF = pf.roadHalf;
    // project() liefert schon die Kurven-Verschiebung; zusätzlich leichte
    // Parallaxe durch Lenken, damit das Lenkgefühl stimmt
    const parallax = -world.carX * 0.12;
    const xN = pn.x + parallax * hN;
    const xF = pf.x + parallax * hF;

    // Gras links/rechts (abwechselnde Grüntöne für Bewegungs-Illusion)
    ctx.fillStyle = (i & 1) ? '#2f5c1f' : '#264d18';
    ctx.beginPath();
    ctx.moveTo(0, yN); ctx.lineTo(xN - hN, yN);
    ctx.lineTo(xF - hF, yF); ctx.lineTo(0, yF);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(W, yN); ctx.lineTo(xN + hN, yN);
    ctx.lineTo(xF + hF, yF); ctx.lineTo(W, yF);
    ctx.closePath(); ctx.fill();

    // Straßenscheibe
    ctx.fillStyle = (i & 1) ? '#323847' : '#2a2f3d';
    ctx.beginPath();
    ctx.moveTo(xN - hN, yN); ctx.lineTo(xN + hN, yN);
    ctx.lineTo(xF + hF, yF); ctx.lineTo(xF - hF, yF);
    ctx.closePath(); ctx.fill();

    // Weiße Ränder
    ctx.strokeStyle = '#f1f5f9';
    ctx.lineWidth = Math.max(1.2, 2.2 * pn.scale);
    ctx.beginPath();
    ctx.moveTo(xN - hN, yN); ctx.lineTo(xF - hF, yF);
    ctx.moveTo(xN + hN, yN); ctx.lineTo(xF + hF, yF);
    ctx.stroke();

    // Gelbe Mittelstreifen (nur jede zweite Scheibe = gestrichelte Linie)
    if (i & 1){
      ctx.fillStyle = '#fde047';
      const dN = Math.max(1, 3 * pn.scale);
      const dF = Math.max(1, 3 * pf.scale);
      ctx.beginPath();
      ctx.moveTo(xN - dN, yN); ctx.lineTo(xN + dN, yN);
      ctx.lineTo(xF + dF, yF); ctx.lineTo(xF - dF, yF);
      ctx.closePath(); ctx.fill();
    }
  }
}

// ══════════ Ziellinie ══════════
// Wenn das Ziel in Sichtweite ist, über die Straße ein schwarz-weißes
// Karomuster zeichnen.
function drawFinishLine(){
  const z = distanceToZ(TRACK_LENGTH);
  if (z > 1 || z < -0.1) return;
  const pN = project(0, Math.max(0.001, z));
  const pF = project(0, Math.max(0.001, z + 0.04));
  const yN = pN.y, yF = pF.y;
  const hN = pN.roadHalf, hF = pF.roadHalf;
  const camShift = -world.carX * 0.15;
  const xN = W/2 + camShift * hN, xF = W/2 + camShift * hF;

  // Kariertes Muster in ~10 Feldern
  const cols = 10;
  for (let c = 0; c < cols; c++){
    ctx.fillStyle = (c & 1) ? '#111827' : '#f8fafc';
    const t1 = c / cols, t2 = (c + 1) / cols;
    const x1N = xN - hN + t1 * hN * 2;
    const x2N = xN - hN + t2 * hN * 2;
    const x1F = xF - hF + t1 * hF * 2;
    const x2F = xF - hF + t2 * hF * 2;
    ctx.beginPath();
    ctx.moveTo(x1N, yN); ctx.lineTo(x2N, yN);
    ctx.lineTo(x2F, yF); ctx.lineTo(x1F, yF);
    ctx.closePath(); ctx.fill();
  }
}

// ══════════ Spieler-Auto (von hinten, im Vordergrund) ══════════
// Wie in klassischen Arcade-Racern: Auto bleibt unten Mitte stehen, lehnt
// leicht zur Seite beim Lenken. Farbe = Wunschfarbe.
function drawPlayerCar(){
  const carW = Math.min(W * 0.22, 180);
  const carH = carW * 0.9;
  const cx = W/2 + world.tilt * (W * 0.08);
  const cy = H - Math.min(H * 0.32, 210) - carH * 0.15;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(world.tilt * 0.08);

  // Schatten
  ctx.fillStyle = 'rgba(0,0,0,.45)';
  ctx.beginPath();
  ctx.ellipse(0, carH/2 + 10, carW*0.55, 12, 0, 0, Math.PI*2);
  ctx.fill();

  // Reifen
  ctx.fillStyle = '#0f172a';
  roundRect(-carW/2 - 8, -carH/2 + 18, 16, 28, 4); ctx.fill();
  roundRect( carW/2 - 8, -carH/2 + 18, 16, 28, 4); ctx.fill();
  roundRect(-carW/2 - 8,  carH/2 - 46, 16, 28, 4); ctx.fill();
  roundRect( carW/2 - 8,  carH/2 - 46, 16, 28, 4); ctx.fill();

  // Karosserie mit Verlauf
  const grad = ctx.createLinearGradient(-carW/2, 0, carW/2, 0);
  grad.addColorStop(0,   shade(state.color, -0.15));
  grad.addColorStop(0.5, state.color);
  grad.addColorStop(1,   shade(state.color, -0.15));
  ctx.fillStyle = grad;
  roundRect(-carW/2, -carH/2, carW, carH, 18); ctx.fill();

  // Heckscheibe
  ctx.fillStyle = 'rgba(180,220,255,.8)';
  roundRect(-carW/2 + 18, -carH/2 + 12, carW - 36, carH * 0.3, 8); ctx.fill();

  // Kofferraum-Trennung
  ctx.strokeStyle = 'rgba(0,0,0,.25)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-carW/2 + 10, carH * 0.08); ctx.lineTo(carW/2 - 10, carH * 0.08); ctx.stroke();

  // Spoiler-Andeutung
  ctx.fillStyle = shade(state.color, -0.25);
  roundRect(-carW/2 + 4, -carH/2 + carH * 0.42, carW - 8, 6, 3); ctx.fill();

  // Rücklichter
  ctx.fillStyle = '#f87171';
  roundRect(-carW/2 + 12, carH/2 - 22, 28, 10, 3); ctx.fill();
  roundRect( carW/2 - 40, carH/2 - 22, 28, 10, 3); ctx.fill();

  // Auspuff
  ctx.fillStyle = '#1f2937';
  roundRect(-12, carH/2 - 8, 24, 8, 3); ctx.fill();

  // Kennzeichen
  ctx.fillStyle = '#e5e7eb';
  roundRect(-22, carH/2 - 24, 44, 12, 3); ctx.fill();

  ctx.restore();
}

// ══════════ Cockpit (Hood-Streifen am unteren Rand) ══════════
function drawDashboard(){
  const dashH   = Math.min(H * 0.32, 200);
  const dashTop = H - dashH;

  // Haube in Wagenfarbe
  const grad = ctx.createLinearGradient(0, dashTop, 0, H);
  grad.addColorStop(0,   state.color);
  grad.addColorStop(.55, state.color);
  grad.addColorStop(1,   shade(state.color, -0.3));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(-30, H);
  ctx.lineTo(-30, dashTop + dashH * 0.45);
  ctx.quadraticCurveTo(W/2, dashTop - 14, W + 30, dashTop + dashH * 0.45);
  ctx.lineTo(W + 30, H);
  ctx.closePath();
  ctx.fill();

  // Glanzstreifen
  ctx.fillStyle = 'rgba(255,255,255,.15)';
  ctx.beginPath();
  ctx.moveTo(0, dashTop + dashH * 0.58);
  ctx.quadraticCurveTo(W/2, dashTop + dashH * 0.3, W, dashTop + dashH * 0.58);
  ctx.quadraticCurveTo(W/2, dashTop + dashH * 0.4, 0, dashTop + dashH * 0.58);
  ctx.closePath(); ctx.fill();

  // Dashboard-Kante (dunkel) — A-Säulen-Andeutung
  ctx.fillStyle = '#111827';
  ctx.fillRect(-30, dashTop - 10, W + 60, 14);

  // Lenkrad mittig unten — dreht sich mit dem Neigungswinkel
  const wheelY = H - dashH * 0.22;
  const wheelR = Math.min(H * 0.16, 90);
  ctx.save();
  ctx.translate(W/2, wheelY + wheelR * 0.25);
  ctx.rotate(world.tilt * 0.6);
  // Ring außen
  ctx.strokeStyle = '#1f2937';
  ctx.lineWidth = 14;
  ctx.beginPath();
  ctx.arc(0, 0, wheelR, Math.PI * 0.12, Math.PI * 0.88, false);
  ctx.stroke();
  ctx.strokeStyle = '#0f172a';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(0, 0, wheelR, Math.PI * 0.12, Math.PI * 0.88, false);
  ctx.stroke();
  // Speichen
  ctx.strokeStyle = '#1f2937';
  ctx.lineWidth = 9;
  ctx.beginPath();
  ctx.moveTo(-wheelR * 0.9, 0);
  ctx.lineTo( wheelR * 0.9, 0);
  ctx.stroke();
  // Nabe
  ctx.fillStyle = '#374151';
  ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = state.color;
  ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// Kleine Hilfsfunktion für Farb-Verläufe
function shade(hex, amt){
  const h = hex.replace('#','');
  const n = parseInt(h.length === 3 ? h.split('').map(c=>c+c).join('') : h, 16);
  let r = (n >> 16) & 0xff, g = (n >> 8) & 0xff, b = n & 0xff;
  r = Math.max(0, Math.min(255, Math.round(r + 255*amt)));
  g = Math.max(0, Math.min(255, Math.round(g + 255*amt)));
  b = Math.max(0, Math.min(255, Math.round(b + 255*amt)));
  return 'rgb('+r+','+g+','+b+')';
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}

// ══════════ Rennen-Update: Spieler + Gegner + Pylonen ══════════
function updateRace(dt){
  if (world.phase === 'start') return; // alles steht
  if (world.phase === 'countdown') return;
  if (world.phase === 'finished') return;

  world.raceTime += dt;

  // Spieler: Zielgeschwindigkeit hängt am Gaspedal (0..1).
  // Ohne Gas geht die Geschwindigkeit runter auf 0 → Auto bleibt stehen.
  const playerTargetSpeed = MAX_SPEED * world.throttle;
  const accel = world.throttle > 0 ? 1.8 : 1.1; // beim Lupfen sanfter auslaufen
  world.playerSpeed += (playerTargetSpeed - world.playerSpeed) * Math.min(1, dt * accel);
  if (world.playerSpeed < 0.5 && world.throttle === 0) world.playerSpeed = 0;
  world.playerDistance += world.playerSpeed * dt * 0.18;

  // Kurven-Drift: die Straße biegt sich, der Wagen wird zur Seite gezogen,
  // wenn man nicht gegenlenkt. Drift ist proportional zur Krümmung und zur
  // gefahrenen Strecke pro Frame.
  const distCovered = world.playerSpeed * dt * 0.18;
  const slope = curveSlopeAt(world.playerDistance);
  const roadHalfBase = Math.min(W * 0.72, 620);
  world.carX -= (slope * distCovered) / roadHalfBase * 0.9;
  world.carX = Math.max(-1, Math.min(1, world.carX));

  // Gegner — breiter schwankende Zielgeschwindigkeiten, damit die Rangfolge
  // sich deutlich ändert: manchmal ziehen sie vorbei, manchmal fallen sie zurück.
  for (const o of world.opponents){
    const targetSpeed = o.baseSpeed
      + Math.sin(world.raceTime * 0.6 + o.phase) * 40
      + Math.sin(world.raceTime * 0.17 + o.phase * 2) * 30;
    o.speed += (targetSpeed - o.speed) * Math.min(1, dt * 1.3);
    o.distance += o.speed * dt * 0.18;
  }

  // scroll-Offset für Straßen-Animation basierend auf gefühltem Speed
  world.scroll = (world.scroll + world.playerSpeed * dt * SCROLL_FACTOR) % 1;

  if (world.hitCooldown > 0) world.hitCooldown -= dt;

  // Kollision mit Pylonen (innerhalb kurzer Distanz + gleiche Spur)
  for (const c of world.cones){
    if (c.hit) continue;
    const dz = c.distance - world.playerDistance;
    if (dz < -6 || dz > 14) continue;
    if (Math.abs(c.lane - world.carX) < 0.25){
      c.hit = true;
      if (world.hitCooldown <= 0){
        world.playerSpeed = Math.max(100, world.playerSpeed - 90);
        world.flash = 0.35;
        world.hitCooldown = 0.5;
      }
    }
  }

  // Kollision mit Gegner-Auto (führt ebenso zu Bremsen)
  for (const o of world.opponents){
    const dz = o.distance - world.playerDistance;
    if (dz < -4 || dz > 12) continue;
    if (Math.abs(o.lane - world.carX) < 0.25){
      if (world.hitCooldown <= 0){
        world.playerSpeed = Math.max(100, world.playerSpeed - 70);
        world.flash = 0.3;
        world.hitCooldown = 0.5;
      }
    }
  }

  if (world.flash > 0) world.flash -= dt;

  // Ziel erreicht?
  if (world.playerDistance >= TRACK_LENGTH){
    finishRace();
  }
}

function currentRank(){
  // Wie viele Gegner sind aktuell weiter als der Spieler?
  let ahead = 0;
  for (const o of world.opponents){
    if (o.distance > world.playerDistance) ahead++;
  }
  return ahead + 1;
}

function finishRace(){
  const place = currentRank();
  world.phase = 'finished';
  world.finishResult = { place, time: world.raceTime };
  finishOverlay.classList.add('show');
  const suffix = place === 1 ? '1. Platz!' : place === 2 ? '2. Platz' : place === 3 ? '3. Platz' : place + '. Platz';
  finishPlaceEl.textContent = suffix + (place === 1 ? ' 🏆' : '');
  finishTimeEl.textContent = 'Zeit: ' + world.raceTime.toFixed(1) + ' s';
}

// ══════════ Zeichnen: Gegner, Pylonen, Ziellinie ══════════
function drawRaceObjects(){
  // Sammle alles mit Z-Wert und zeichne in Reihenfolge "fern → nah".
  const items = [];
  for (const o of world.opponents){
    const z = distanceToZ(o.distance);
    if (z >= -0.15 && z <= 1.1) items.push({ z, kind:'car', obj:o });
  }
  for (const c of world.cones){
    const z = distanceToZ(c.distance);
    if (z >= -0.15 && z <= 1.1) items.push({ z, kind:'cone', obj:c });
  }
  items.sort((a, b) => b.z - a.z);

  // Rang-Berechnung für Badges über Gegnern
  const ranking = computeRanking();

  for (const it of items){
    const laneRel = it.obj.lane - world.carX;
    const p = project(laneRel, Math.max(0.001, it.z));
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(p.scale, p.scale);
    if (it.kind === 'cone') drawCone();
    else {
      drawOpponentCar(it.obj.color);
      // Rang-Badge
      const rank = ranking.get(it.obj);
      if (rank) drawRankBadge(rank);
    }
    ctx.restore();
  }
}

function computeRanking(){
  // Liste aller Racer (Spieler + Gegner) nach distance absteigend sortieren
  const racers = [{ who:'player', distance:world.playerDistance }].concat(
    world.opponents.map(o => ({ who:o, distance:o.distance }))
  );
  racers.sort((a, b) => b.distance - a.distance);
  const map = new Map();
  racers.forEach((r, i) => { if (r.who !== 'player') map.set(r.who, i + 1); });
  return map;
}

function drawRankBadge(rank){
  const label = rank + (rank === 1 ? 'st' : rank === 2 ? 'nd' : rank === 3 ? 'rd' : 'th');
  const badgeW = 42, badgeH = 22;
  ctx.save();
  ctx.translate(0, -65);
  ctx.fillStyle = rank === 1 ? '#fbbf24' : rank === 2 ? '#e5e7eb' : rank === 3 ? '#f97316' : '#64748b';
  roundRect(-badgeW/2, -badgeH/2, badgeW, badgeH, 6); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.font = 'bold 14px -apple-system,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, 0, 1);
  ctx.restore();
}

function drawCone(){
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  ctx.beginPath(); ctx.ellipse(0, 12, 20, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f97316';
  ctx.beginPath();
  ctx.moveTo(-18, 14); ctx.lineTo(18, 14);
  ctx.lineTo(5, -28); ctx.lineTo(-5, -28);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(-13, -2); ctx.lineTo(13, -2);
  ctx.lineTo(10, -10); ctx.lineTo(-10, -10);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(-20, 10, 40, 5);
}

function drawOpponentCar(color){
  // Ansicht von hinten (wir überholen)
  const bodyW = 78, bodyH = 92;
  ctx.fillStyle = 'rgba(0,0,0,.4)';
  ctx.beginPath(); ctx.ellipse(0, bodyH/2 + 8, bodyW*0.55, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0f172a';
  roundRect(-bodyW/2 - 6, -bodyH/2 + 12, 12, 20, 3); ctx.fill();
  roundRect( bodyW/2 - 6, -bodyH/2 + 12, 12, 20, 3); ctx.fill();
  roundRect(-bodyW/2 - 6,  bodyH/2 - 32, 12, 20, 3); ctx.fill();
  roundRect( bodyW/2 - 6,  bodyH/2 - 32, 12, 20, 3); ctx.fill();
  ctx.fillStyle = color;
  roundRect(-bodyW/2, -bodyH/2, bodyW, bodyH, 14); ctx.fill();
  // Heckscheibe (oben)
  ctx.fillStyle = 'rgba(180,220,255,.75)';
  roundRect(-bodyW/2 + 10, -bodyH/2 + 10, bodyW - 20, 24, 6); ctx.fill();
  // Kofferraum-Linie
  ctx.strokeStyle = 'rgba(0,0,0,.25)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-bodyW/2 + 8, 6); ctx.lineTo(bodyW/2 - 8, 6); ctx.stroke();
  // Rücklichter
  ctx.fillStyle = '#ef4444';
  roundRect(-bodyW/2 + 8, bodyH/2 - 16, 18, 8, 3); ctx.fill();
  roundRect( bodyW/2 - 26, bodyH/2 - 16, 18, 8, 3); ctx.fill();
  // Kennzeichen
  ctx.fillStyle = '#e5e7eb';
  roundRect(-18, bodyH/2 - 18, 36, 10, 2); ctx.fill();
}

// ══════════ Lenkung über DeviceOrientation ══════════
// Lenk-Achse hängt von der Bildschirm-Orientierung ab.
// Wir kalibrieren beim Spielstart auf 0, dann zählt nur die Differenz.
const steer = {
  baseline: null,   // Startwert beim Kalibrieren
  raw: 0,           // aktueller Rohwert (Grad)
  enabled: false
};

function orientationAngle(){
  if(screen.orientation && typeof screen.orientation.angle === 'number') return screen.orientation.angle;
  return window.orientation || 0;
}

// Nimmt das passende Achsen-Grad (gamma oder beta) je nach Landscape-Seite.
// Konvention: positives Ergebnis = Auto soll NACH RECHTS lenken.
// → „rechte Bildschirmseite nach unten kippen" muss positiv werden.
function tiltFromEvent(e){
  const a = orientationAngle();
  if(a === 0)    return e.gamma || 0;           // Portrait: gamma links/rechts
  if(a === 180)  return -(e.gamma || 0);
  if(a === 90)   return  (e.beta  || 0);        // Landscape, Home rechts
  if(a === 270 || a === -90) return -(e.beta || 0); // Landscape, Home links
  return e.gamma || 0;
}

function onDeviceOrientation(e){
  const t = tiltFromEvent(e);
  if(steer.baseline === null) steer.baseline = t;
  steer.raw = t - steer.baseline;
}

async function enableTilt(){
  // iOS 13+ benötigt explizite Permission durch User-Geste
  if(typeof DeviceOrientationEvent !== 'undefined'
     && typeof DeviceOrientationEvent.requestPermission === 'function'){
    try{
      const res = await DeviceOrientationEvent.requestPermission();
      if(res !== 'granted') return false;
    }catch{ return false; }
  }
  if(!steer.enabled){
    window.addEventListener('deviceorientation', onDeviceOrientation, true);
    steer.enabled = true;
  }
  steer.baseline = null; // beim nächsten Event neu kalibrieren
  return true;
}

// Lenkwert pro Frame in world.carX einfließen lassen (nur während des Rennens)
function applySteering(dt){
  if (world.phase !== 'racing') return; // vor/nach dem Rennen nicht lenken
  const MAX_DEG  = 7;
  const DEAD_DEG = 1.2;
  let r = steer.raw;
  if (Math.abs(r) < DEAD_DEG) r = 0;
  else r = r > 0 ? r - DEAD_DEG : r + DEAD_DEG;
  const t = Math.max(-1, Math.min(1, r / (MAX_DEG - DEAD_DEG)));
  world.tilt = world.tilt + (t - world.tilt) * Math.min(1, dt * 8);
  world.carX += world.tilt * dt * 1.05;
  world.carX = Math.max(-1, Math.min(1, world.carX));
}

// ══════════ Haupt-Loop ══════════
let lastT = 0, rafId = 0;
const posEl       = document.getElementById('pos');
const progressEl  = document.getElementById('progress');
const countdownEl = document.getElementById('countdown');
const startOverlayEl = document.getElementById('startOverlay');
const finishOverlay  = document.getElementById('finishOverlay');
const finishPlaceEl  = document.getElementById('finishPlace');
const finishTimeEl   = document.getElementById('finishTime');

function loop(ts){
  if(!world.running) return;
  const dt = Math.min(0.05, (ts - lastT) / 1000 || 0);
  lastT = ts;

  checkOrientation();
  applySteering(dt);
  updateRace(dt);

  drawRoad(dt);
  drawFinishLine();
  drawRaceObjects();
  drawPlayerCar();

  // Roter Flash bei Kollision
  if (world.flash > 0){
    ctx.fillStyle = 'rgba(239, 68, 68, ' + Math.min(.4, world.flash * 1.2) + ')';
    ctx.fillRect(0, 0, W, H);
  }

  // HUD updaten
  const rank = world.phase === 'racing' || world.phase === 'finished' ? currentRank() : '—';
  const total = world.opponents.length + 1;
  if (typeof rank === 'number'){
    const suf = rank === 1 ? 'st' : rank === 2 ? 'nd' : rank === 3 ? 'rd' : 'th';
    posEl.textContent = rank + suf;
  } else {
    posEl.textContent = '—';
  }
  speedEl.textContent = Math.round(world.playerSpeed * 0.6) + ' km/h';
  progressEl.style.width = Math.min(100, (world.playerDistance / TRACK_LENGTH) * 100) + '%';

  rafId = requestAnimationFrame(loop);
}

// ══════════ Countdown-Ablauf ══════════
function runCountdown(){
  world.phase = 'countdown';
  startOverlayEl.classList.remove('show');
  const seq = ['3','2','1','LOS!'];
  let i = 0;
  const showNext = () => {
    if (i >= seq.length){
      countdownEl.classList.remove('show');
      world.phase = 'racing';
      return;
    }
    countdownEl.classList.add('show');
    countdownEl.innerHTML = '<span>' + seq[i] + '</span>';
    i++;
    setTimeout(showNext, 900);
  };
  showNext();
}

// ══════════ Spiel starten (aus Menü) ══════════
async function startGame(){
  await enableTilt();
  showScene('game');
  requestAnimationFrame(()=>{
    resize();
    initRace();
    world.phase = 'start';
    world.running = true;
    startOverlayEl.classList.add('show');
    countdownEl.classList.remove('show');
    finishOverlay.classList.remove('show');
    lastT = performance.now();
    rafId = requestAnimationFrame(loop);
  });
}

function stopGame(){
  world.running = false;
  cancelAnimationFrame(rafId);
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('raceStartBtn').addEventListener('click', ()=>{
  // iOS verlangt User-Geste vor Web Audio → hier auch gleich den Hup-Context wecken
  try { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch{}
  runCountdown();
});
document.getElementById('restartBtn').addEventListener('click', ()=>{
  finishOverlay.classList.remove('show');
  initRace();
  world.phase = 'start';
  startOverlayEl.classList.add('show');
});

// ══════════ Auto-Start wenn Handy quer ══════════
// Wenn der Nutzer das Handy (schon oder nach dem Öffnen) quer hält und im
// Menü ist, Spiel automatisch starten — er muss nicht erst „Los geht's" tippen.
// Pro Seitenaufruf nur einmal: wer über „‹ Menü" zurückkommt, tippt wieder
// manuell, damit er seine Auswahl ändern kann.
let autoStartUsed = false;
function tryAutoStart(){
  if (autoStartUsed) return;
  if (!menuScene.classList.contains('active')) return;
  if (window.innerWidth <= window.innerHeight) return; // Portrait → nichts tun
  autoStartUsed = true;
  // Kleiner Moment, damit man beim Öffnen noch eben die Farbe wechseln kann
  setTimeout(()=>{
    if (menuScene.classList.contains('active') && window.innerWidth > window.innerHeight) {
      startGame();
    }
  }, 900);
}
window.addEventListener('load', tryAutoStart);
window.addEventListener('orientationchange', () => setTimeout(tryAutoStart, 300));

// ══════════ Hupe (Web Audio) ══════════
let audioCtx = null;
function honk(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();

    const now = audioCtx.currentTime;
    // Zwei leicht versetzte Sägezahn-Töne → klassischer Auto-Hupton
    const freqs = [420, 520];
    freqs.forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.18, now + 0.02);
      gain.gain.setValueAtTime(0.18, now + 0.28);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.38);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.42);
    });
  }catch(err){ /* stumm weiter */ }
}

const honkBtn = document.getElementById('honkBtn');
// pointerdown deckt Maus und Touch ab — click explizit unterdrücken, damit nicht doppelt
honkBtn.addEventListener('pointerdown', (e)=>{ e.preventDefault(); honk(); });
honkBtn.addEventListener('click', (e)=>{ e.preventDefault(); });

// ══════════ Gaspedal ══════════
// Halten = beschleunigen, Loslassen = ausrollen bis Stillstand.
// pointerdown/up deckt Maus und Touch ab. Über die CSS-Klasse 'pressed'
// wird der Knopf optisch eingedrückt.
const gasBtn = document.getElementById('gasBtn');
function gasPress(e){
  e.preventDefault();
  world.throttle = 1;
  gasBtn.classList.add('pressed');
  // Audio-Context beim ersten Tap unlocken (iOS-Anforderung)
  try { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch{}
}
function gasRelease(e){
  if (e) e.preventDefault();
  world.throttle = 0;
  gasBtn.classList.remove('pressed');
}
gasBtn.addEventListener('pointerdown', gasPress);
gasBtn.addEventListener('pointerup', gasRelease);
gasBtn.addEventListener('pointerleave', gasRelease);
gasBtn.addEventListener('pointercancel', gasRelease);
gasBtn.addEventListener('click', (e)=>{ e.preventDefault(); });
// Sicherheit: wenn Finger den Knopf verlässt oder der Browser den Focus verliert,
// Gas wegnehmen, damit das Auto nicht "weiterfährt" wenn der Touch abbricht.
window.addEventListener('blur', () => gasRelease());
document.addEventListener('visibilitychange', () => { if (document.hidden) gasRelease(); });

// ══════════ Service Worker (PWA) ══════════
// Der SW dient nur als Offline-Shell + Asset-Cache. HTML kommt dank network-
// first-Strategie immer frisch vom Server. Wenn ein neuer SW übernimmt (nach
// einem Deploy), laden wir den Tab einmalig automatisch neu — so sieht der
// Nutzer sofort die neue Version, ohne die PWA zweimal öffnen zu müssen.
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js', { scope: './' }).then(reg => {
      // Beim Rückkehr in den Vordergrund nach Update-SW suchen lassen
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) reg.update().catch(()=>{});
      });
    }).catch(()=>{});

    let refreshed = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshed) return;
      refreshed = true;
      window.location.reload();
    });
  });
}

// Landscape-Lock versuchen (klappt nur im installierten/fullscreen-PWA-Kontext)
function tryLockLandscape(){
  try{
    if(screen.orientation && screen.orientation.lock){
      screen.orientation.lock('landscape').catch(()=>{});
    }
  }catch{}
}
// Beim Start versuchen — scheitert auf iOS, das ist ok (Nutzer dreht manuell)
document.getElementById('startBtn').addEventListener('click', tryLockLandscape);
</script>
