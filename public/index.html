<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#1e3a0f">
<title>Flora Spiele</title>
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;-webkit-user-select:none;user-select:none;overscroll-behavior:none}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(180deg,#2f4d1a 0%,#1e3a0f 100%);
  color:#f1f5f9;min-height:100dvh;touch-action:manipulation;
  display:flex;flex-direction:column;align-items:center;padding:24px 16px;
}
h1{font-size:32px;margin:8px 0 4px;text-align:center;letter-spacing:.5px}
.sub{font-size:14px;opacity:.7;margin:0 0 24px;text-align:center}

.grid{
  display:grid;gap:14px;width:100%;max-width:480px;
  grid-template-columns:1fr;
}
@media (min-width: 420px){ .grid{ grid-template-columns:1fr 1fr; } }

a.tile{
  display:flex;flex-direction:column;align-items:flex-start;gap:6px;
  padding:20px 18px;border-radius:18px;text-decoration:none;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:#f1f5f9;min-height:140px;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  transition:transform .15s,background .15s;
}
a.tile:active{ transform:scale(.97); background:rgba(255,255,255,.1); }
.tile .emoji{font-size:42px;line-height:1}
.tile .name{font-size:20px;font-weight:700;margin-top:6px}
.tile .desc{font-size:13px;opacity:.8;line-height:1.3}
.tile .accent{
  margin-top:auto;align-self:stretch;height:4px;border-radius:3px;
  background:var(--accent,#7ec14a);opacity:.9
}

.hint{margin-top:28px;font-size:12px;opacity:.55;text-align:center;max-width:420px;line-height:1.4}
</style>
</head>
<body>
  <h1>Flora Spiele</h1>
  <p class="sub">Wähl ein Spiel zum Spielen oder Installieren</p>

  <div id="grid" class="grid"></div>

  <p class="hint">Jedes Spiel ist eine eigene kleine App — einfach öffnen und bei Bedarf über das Browser-Menü zum Startbildschirm hinzufügen.</p>

<script>
// Alten Ballongarten-SW mit Scope / ablösen (Kill-Switch-SW räumt sich selbst auf).
// Für Erstbesucher ohne alten SW ist das ein No-op, daher unschädlich.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// Spiele-Liste aus games.json laden — neue Spiele einfach dort eintragen,
// passender Unterordner muss existieren (z.B. /autorennen/ für slug "autorennen").
fetch('./games.json', { cache: 'no-store' })
  .then(r => r.json())
  .then(list => {
    const grid = document.getElementById('grid');
    list.forEach(g => {
      const a = document.createElement('a');
      a.className = 'tile';
      a.href = './' + g.slug + '/';
      a.style.setProperty('--accent', g.color || '#7ec14a');
      a.innerHTML = `
        <div class="emoji">${g.emoji || '🎮'}</div>
        <div class="name">${g.name}</div>
        <div class="desc">${g.subtitle || ''}</div>
        <div class="accent"></div>`;
      grid.appendChild(a);
    });
  })
  .catch(() => {
    document.getElementById('grid').innerHTML =
      '<p style="opacity:.7">Konnte Spieleliste nicht laden.</p>';
  });
</script>
</body>
</html>
